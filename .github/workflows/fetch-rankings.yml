name: Fetch Stock Rankings

on:
  workflow_dispatch:
  schedule:
    - cron: "50 6 * * 1-5"
    - cron: "10 7 * * 1-5"

jobs:
  fetch-rankings:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Fetch JP rankings
        run: npx tsx scripts/fetch-yahoo.ts

      - name: Fetch US rankings
        run: npx tsx scripts/fetch-us.ts

      - name: Fetch SP500 rankings
        run: npx tsx scripts/fetch-sp500.ts